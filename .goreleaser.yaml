version: 2

project_name: forgesync

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/forgesync
    binary: forgesync
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      # injects the tag into your version variable at build time
      - -s -w -X github.com/nox456/forgesync/internal/cli.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude: ['^docs', '^test', '^chore', '^refactor']
